version: "3.9"

services:
  fai-exercises:
    build:
      # Build context must be the repo ROOT so Docker can reach
      # both requirements.txt and exercises/ from the Dockerfile.
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fai_search_exercises
    ports:
      - "8888:8888"
    volumes:
      # Mount the exercises folder so edits inside JupyterLab are
      # saved directly to your local disk and survive container restarts.
      - ../exercises:/home/jovyan/work/exercises
    restart: unless-stopped

